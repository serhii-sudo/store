services:
  postgres:
    image: postgres:latest
    container_name: postgres_store
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  redis:
    image: redis:latest
    container_name: redis_store
    ports:
      - "6379:6379"
    volumes:
      - redis_store:/data


volumes:
  pgdata:
  redis_store: