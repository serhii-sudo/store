<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>user-registration</title>

    <!--  cdn ссылки-->
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Bootstrap Simple Login Form</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

 <!--    Плагины могут подключаться отдельно (используя отдельные файлы Bootstrap *.js),
или все за один раз (используя bootstrap.js или минимизированы bootstrap.min.js).-->
<style>
.login-form {
    width: 360px;
    margin: 50px auto;
  	font-size: 15px;
}
.login-form form {
    margin-bottom: 15px;
    background: #f7f7f7;
    box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.3);
    padding: 18px;
}
.login-form h2 {
    margin: 0 0 10px;
}
.form-control, .btn {
    min-height: 38px;
    border-radius: 2px;
}
.btn {
    font-size: 14px;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="login-form">
    <form action="{% url 'registration' %}" method="post">
           {% csrf_token %}
        <h3 class="text-center">Registration</h3>
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}"></label>
            {{ form.username }}
        </div>
        <div class="form-group">
             <label for="{{ form.email.id_for_label }}"></label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label for="{{ form.password1.id_for_label }}"></label>
            {{ form.password1 }}
        </div>
         <div class="form-group">
            <label for="{{ form.password2.id_for_label }}"></label>
            {{ form.password2}}
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-success btn-block">Sign up</button>
        </div>
        <div class="form-group">
            <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-danger btn-block">Sign up with Google</a>
        </div>
        <div class="form-group">
            <a href="{% url 'telegram_start' %}" class="btn btn-info btn-block">Sign up with Telegram</a>
        </div>
        <div class="clearfix">
            <label class="float-left form-check-label"><input type="checkbox">Remember me</label>
        </div>
    </form>
</div>

{% if user.is_authenticated %}
<form method="post" action="{% url 'profile' %}">
    {% csrf_token %}
</form>
{% endif %}
</body>
</html>
