<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>user-authorization</title>

    <!--  cdn ссылки-->
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Bootstrap Simple Login Form</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

<script src="{% static 'vendor/js/telegram_check.js' %}?v=2"></script>

 <!--    Плагины могут подключаться отдельно (используя отдельные файлы Bootstrap *.js),
или все за один раз (используя bootstrap.js или минимизированы bootstrap.min.js).-->
<style>
.login-form {
    width: 360px;
    margin: 50px auto;
  	font-size: 15px;
}
.login-form form {
    margin-bottom: 15px;
    background: #f7f7f7;
    box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.3);
    padding: 18px;
}
.login-form h2 {
    margin: 0 0 10px;
}
.form-control, .btn {
    min-height: 38px;
    border-radius: 2px;
}
.btn {
    font-size: 14px;
    font-weight: bold;
}
</style>
</head>

<body>
<div class="login-form">
    <form>
        <h3 class="text-center">Telegram code</h3>
        <div class="form-group">
            <label for="{{ form.code.id_for_label }}"></label>
            {{ form.code}}
        </div>
        <div class="form-group">
            <a href="https://t.me/device_telegram_store_bot?start={{ code }}" target="_blank" class="btn btn-info btn-block">Open Telegram and confirm</a>
        </div>

        <script>
            window.TG_CODE = "{{ code }}";
        </script>
    </form>

</div>
</body>
</html>
